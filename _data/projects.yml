- title: "State-Space Neural Decoding"
  institution: "USC - EE 675 Neural Engineering"
  date: "Fall 2025"
  description: "Built and benchmarked state-space decoders — Kalman filter, RTS smoother, and Preferential Subspace Identification (PSID) — to decode motor kinematics from 96-neuron primate motor cortex recordings (O'Doherty dataset). Validated Kalman optimality on the innovation sequence with Jarque-Bera and Ljung-Box tests; PSID improved velocity decoding from R2 = 0.41 (KF) to R2 = 0.48 (+16.6%)."
  metric: "R² 0.48"
  metric_label: "velocity decoding — PSID, +16.6% over Kalman"
  tags:
    - Neural Decoding
